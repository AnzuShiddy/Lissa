<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#160b13">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/png" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>Lissa 💋</title>
<script>
  // Set the theme before CSS paints, so a light-theme visitor never sees a
  // flash of the dark theme first.
  (function () {
    try {
      var t = localStorage.getItem("lissa_theme");
      if (t !== "light" && t !== "dark") {
        t = (window.matchMedia && matchMedia("(prefers-color-scheme: light)").matches)
          ? "light" : "dark";
      }
      if (t === "light") document.documentElement.setAttribute("data-theme", "light");
    } catch (e) {}
  })();
</script>
<style>
  :root {
    --bg0: #120810;
    --bg1: #1e0f1a;
    --rose: #ff5c8f;
    --rose-soft: #ff8fb0;
    --violet: #a86cf5;
    --text: #f7ecf2;
    --muted: #ab8ca0;
    --glass: rgba(255, 255, 255, 0.05);
    --glass-strong: rgba(255, 255, 255, 0.08);
    --border: rgba(255, 255, 255, 0.09);
    --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
  }
  :root[data-theme="light"] {
    --bg0: #fdf3f7;
    --bg1: #ffffff;
    --rose: #ff5c8f;
    --rose-soft: #d6316f;
    --violet: #8b5cf0;
    --text: #2b1626;
    --muted: #7d6672;
    --glass: rgba(43, 22, 38, 0.045);
    --glass-strong: rgba(43, 22, 38, 0.075);
    --border: rgba(43, 22, 38, 0.12);
    --shadow: 0 18px 40px rgba(43, 22, 38, 0.14);
  }
  :root[data-theme="light"] header,
  :root[data-theme="light"] #bar {
    background: rgba(255, 255, 255, 0.8);
  }
  :root[data-theme="light"] #panel {
    background: linear-gradient(170deg, #ffffff, #fdf0f5);
  }
  :root[data-theme="light"] #toast,
  :root[data-theme="light"] #jump {
    background: rgba(255, 255, 255, 0.94);
  }
  :root[data-theme="light"] .glow { opacity: 0.28; }
  :root[data-theme="light"] .retryBtn,
  :root[data-theme="light"] #panel .row .danger,
  :root[data-theme="light"] .iconBtn.confirm {
    color: #c2185b;
    border-color: rgba(194, 24, 91, 0.35);
  }
  :root[data-theme="light"] #panel .row .danger.confirm {
    background: rgba(194, 24, 91, 0.14);
    border-color: #c2185b;
    color: #a3134e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: "Segoe UI Variable Text", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", sans-serif;
    background: radial-gradient(120% 90% at 20% 0%, var(--bg1), var(--bg0) 70%);
    color: var(--text);
    display: flex;
    justify-content: center;
    overflow: hidden;
  }

  /* ambient glow blobs */
  .glow {
    position: fixed;
    border-radius: 50%;
    filter: blur(90px);
    opacity: 0.5;
    pointer-events: none;
    animation: drift 26s ease-in-out infinite alternate;
  }
  .glow.g1 { width: 480px; height: 480px; left: -160px; top: -140px;
             background: radial-gradient(circle, rgba(255, 92, 143, 0.32), transparent 70%); }
  .glow.g2 { width: 520px; height: 520px; right: -200px; bottom: -180px;
             background: radial-gradient(circle, rgba(168, 108, 245, 0.26), transparent 70%);
             animation-delay: -13s; }
  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(60px, 40px) scale(1.15); }
  }

  #frame {
    width: 100%;
    max-width: 780px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }
  @media (min-width: 800px) {
    #frame {
      height: calc(100dvh - 48px);
      margin: 24px 0;
      border: 1px solid var(--border);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.02);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
  }

  /* ---------- header ---------- */
  header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(20, 10, 17, 0.6);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    /* backdrop-filter makes this a stacking context, which traps the
       menu's z-index inside it — without a layer of its own the header
       paints under #chat and wide bubbles cover the open menu */
    position: relative;
    z-index: 8; /* over #chat and the jump pill (5), under #overlay (10) */
  }
  #avatarWrap { position: relative; flex-shrink: 0; cursor: pointer; }
  #avatar {
    width: 60px; height: 60px;
    border-radius: 50%;
    overflow: hidden;
    background: linear-gradient(135deg, var(--rose), var(--violet));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 18px rgba(255, 92, 143, 0.35);
  }
  #avatar svg { width: 100%; height: 100%; display: block; }
  /* she blinks every few seconds, eyes slightly out of phase */
  #avatar .eye {
    transform-box: fill-box; transform-origin: center;
    animation: blink 4.6s infinite;
  }
  #avatar .eye + .eye { animation-delay: 0.07s; }
  @keyframes blink {
    0%, 93.5%, 97.5%, 100% { transform: scaleY(1); }
    95.5% { transform: scaleY(0.07); }
  }
  /* while speaking: jaw moves, antenna pulses, head sways gently */
  #avatar #mouthOpen { opacity: 0; transition: opacity 0.25s; }
  #avatarWrap.speaking #mouthOpen { opacity: 0.9; }
  #avatarWrap.speaking #lipLower { animation: jaw 0.27s ease-in-out infinite alternate; }
  @keyframes jaw {
    from { transform: translateY(0); }
    to   { transform: translateY(3.4px); }
  }
  #avatarWrap.speaking #lipUpper { animation: lipUp 0.27s ease-in-out infinite alternate; }
  @keyframes lipUp {
    from { transform: translateY(0); }
    to   { transform: translateY(-0.8px); }
  }
  #avatarWrap.speaking #antTip { animation: antGlow 0.9s ease-in-out infinite; }
  @keyframes antGlow {
    0%, 100% { fill: #ffb3c0; }
    50% { fill: #ff2e6e; }
  }
  #avatarWrap.speaking #head {
    transform-box: fill-box; transform-origin: 50% 60%;
    animation: sway 2.6s ease-in-out infinite;
  }
  @keyframes sway {
    0%, 100% { transform: rotate(0deg); }
    30% { transform: rotate(1.6deg); }
    70% { transform: rotate(-1.6deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    #avatar .eye, #lipLower, #lipUpper, #antTip, #head { animation: none !important; }
  }
  #avatarWrap::before {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid transparent;
  }
  #avatarWrap.speaking::before {
    border-color: rgba(255, 92, 143, 0.65);
    animation: ring 1.4s ease-out infinite;
  }
  @keyframes ring {
    0%   { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  #dot {
    position: absolute;
    right: 0; bottom: 1px;
    width: 11px; height: 11px;
    border-radius: 50%;
    background: #43d17c;
    border: 2px solid var(--bg1);
  }
  #title { flex: 1; min-width: 0; }
  #title h1 {
    font-size: 18px;
    font-weight: 650;
    letter-spacing: 0.2px;
    background: linear-gradient(90deg, var(--text), var(--rose-soft));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  #status { font-size: 12.5px; color: var(--muted); transition: color 0.3s; }
  #status.active { color: var(--rose-soft); }

  .iconBtn {
    width: 40px; height: 40px;
    border-radius: 13px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s, opacity 0.2s;
    flex-shrink: 0;
  }
  .iconBtn:hover { background: var(--glass-strong); }
  .iconBtn:active { transform: scale(0.93); }
  .iconBtn:focus-visible, .roundBtn:focus-visible, #jump:focus-visible,
  #avatarWrap:focus-visible, .bubble .retryBtn:focus-visible,
  #panel .row button:focus-visible {
    outline: 2px solid var(--rose-soft);
    outline-offset: 2px;
  }
  .iconBtn svg { width: 19px; height: 19px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  .iconBtn.confirm {
    background: rgba(255, 77, 109, 0.18);
    border-color: #ff4d6d;
    color: #ffb3c0;
  }
  .iconBtn.on {
    background: rgba(255, 92, 143, 0.14);
    border-color: rgba(255, 92, 143, 0.55);
    color: var(--rose-soft);
  }
  #voiceBtn.off { opacity: 0.4; }
  /* header overflow menu */
  #menuWrap { position: relative; flex-shrink: 0; }
  #menu {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: 60;
    min-width: 232px;
    padding: 6px;
    border-radius: 16px;
    border: 1px solid var(--border);
    background: linear-gradient(170deg, #2b1826, #1f1019);
    box-shadow: var(--shadow);
    animation: menuIn 0.16s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }
  #menu[hidden] { display: none; }
  @keyframes menuIn { from { opacity: 0; transform: translateY(-8px); } }
  :root[data-theme="light"] #menu {
    background: linear-gradient(170deg, #ffffff, #fdf0f5);
  }
  .menuItem {
    width: 100%;
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 0;
    border-radius: 11px;
    background: none;
    color: var(--text);
    font: inherit;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: background 0.13s;
  }
  .menuItem:hover, .menuItem:focus-visible { background: var(--glass-strong); }
  .menuItem:focus-visible { outline: 2px solid var(--rose); outline-offset: -2px; }
  .menuItem svg.mIcon {
    width: 18px; height: 18px;
    flex-shrink: 0;
    fill: none; stroke: currentColor; stroke-width: 1.9;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .mLabel { flex: 1; }
  .menuItem svg.mCheck {
    width: 16px; height: 16px;
    flex-shrink: 0;
    fill: none; stroke: var(--rose); stroke-width: 2.6;
    stroke-linecap: round; stroke-linejoin: round;
    opacity: 0;
    transition: opacity 0.13s;
  }
  .menuItem[aria-checked="true"] svg.mCheck { opacity: 1; }
  .menuItem[aria-checked="true"] svg.mIcon { color: var(--rose-soft); }
  .menuItem.confirm {
    background: rgba(255, 77, 109, 0.18);
    color: #ffb3c0;
  }
  :root[data-theme="light"] .menuItem.confirm { color: #c2185b; }
  .menuSep {
    height: 1px;
    margin: 6px 8px;
    background: var(--border);
  }

  #voiceBtn .on-icon { display: block; }
  #voiceBtn .off-icon { display: none; }
  #voiceBtn.off .on-icon { display: none; }
  #voiceBtn.off .off-icon { display: block; }

  /* shows the icon for the theme a click would switch TO */
  /* the menu item keeps a steady sun: its checkmark carries the state,
     so swapping to a moon would contradict the "Light theme" label */

  /* ---------- chat ---------- */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 22px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 8px; }
  #chat::-webkit-scrollbar-track { background: transparent; }

  .timestamp {
    align-self: center;
    font-size: 11.5px;
    color: var(--muted);
    padding: 4px 0 0;
    user-select: none;
  }

  .visually-hidden {
    position: absolute;
    width: 1px; height: 1px;
    overflow: hidden;
    clip-path: inset(50%);
    white-space: nowrap;
  }

  .bubble {
    max-width: 78%;
    padding: 11px 16px;
    border-radius: 20px;
    line-height: 1.5;
    font-size: 15px;
    white-space: pre-wrap;
    overflow-wrap: break-word;
    animation: pop 0.28s cubic-bezier(0.2, 0.9, 0.3, 1.2);
  }
  @keyframes pop {
    from { opacity: 0; transform: translateY(10px) scale(0.96); }
  }
  .lissa {
    align-self: flex-start;
    background: var(--glass-strong);
    border: 1px solid var(--border);
    border-bottom-left-radius: 7px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    position: relative; /* anchors the copy button */
  }

  .copyBtn {
    position: absolute;
    top: 4px;
    right: -36px;
    width: 28px; height: 28px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.15s, background 0.15s;
  }
  .bubble.lissa:hover .copyBtn, .copyBtn:focus-visible { opacity: 1; }
  .copyBtn:hover { background: var(--glass-strong); color: var(--text); }
  .copyBtn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .user {
    align-self: flex-end;
    background: linear-gradient(135deg, var(--rose), #d84176);
    color: #fff;
    border-bottom-right-radius: 7px;
    box-shadow: 0 6px 20px rgba(255, 92, 143, 0.25);
  }

  .bubble .retryBtn {
    display: block;
    margin-top: 10px;
    padding: 7px 14px;
    border-radius: 11px;
    border: 1px solid rgba(255, 146, 165, 0.35);
    background: none;
    color: #ff92a5;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .bubble .retryBtn:hover { background: rgba(255, 77, 109, 0.12); }

  .typing-dots { display: inline-flex; gap: 5px; padding: 4px 2px; }
  .typing-dots i {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--rose-soft);
    animation: bob 1.2s infinite;
  }
  .typing-dots i:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots i:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bob {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* ---------- input bar ---------- */
  #bar {
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: rgba(20, 10, 17, 0.6);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }
  #composer, #recorder { display: flex; gap: 10px; align-items: center; }
  #composer { align-items: flex-end; }
  #composer[hidden], #recorder[hidden] { display: none; }

  #msg {
    flex: 1;
    min-width: 0;
    background: var(--glass);
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    line-height: 1.45;
    padding: 12px 18px;
    outline: none;
    resize: none;
    max-height: 120px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #msg::placeholder { color: var(--muted); }
  #msg:focus {
    border-color: rgba(255, 92, 143, 0.55);
    box-shadow: 0 0 0 3px rgba(255, 92, 143, 0.12);
  }

  .roundBtn {
    width: 46px; height: 46px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--text);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .roundBtn:hover { background: var(--glass-strong); }
  .roundBtn:active { transform: scale(0.92); }
  .roundBtn:disabled { opacity: 0.4; cursor: default; }
  .roundBtn svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.9; stroke-linecap: round; stroke-linejoin: round; }
  #send {
    background: linear-gradient(135deg, var(--rose), #d84176);
    border: none;
    color: #fff;
    box-shadow: 0 6px 18px rgba(255, 92, 143, 0.35);
  }
  #send:hover { filter: brightness(1.08); background: linear-gradient(135deg, var(--rose), #d84176); }
  #send .stop-icon { display: none; }
  #send.stop .send-icon { display: none; }
  #send.stop .stop-icon { display: block; }
  /* photo attachment */
  .bubble img { display: block; max-width: 100%; border-radius: 14px; }
  .bubble img + div { margin-top: 8px; }
  #attachPreview {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 4px 12px;
  }
  #attachPreview[hidden] { display: none; }
  #attachPreview img {
    height: 56px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  #attachHint { flex: 1; font-size: 12.5px; color: var(--muted); }
  #attachRemove {
    width: 30px; height: 30px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--glass);
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  #attachRemove:hover { background: var(--glass-strong); color: var(--text); }
  #attachRemove svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }

  #mic { touch-action: none; -webkit-user-select: none; user-select: none; }
  #mic.busy { animation: fade 1.1s infinite; }
  @keyframes fade { 50% { opacity: 0.35; } }

  /* recording mode */
  #recorder {
    background: var(--glass);
    border: 1px solid rgba(255, 92, 143, 0.35);
    border-radius: 24px;
    padding: 6px 8px;
  }
  #recDot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ff4d6d;
    margin-left: 10px;
    animation: fade 1.1s infinite;
    flex-shrink: 0;
  }
  #meter {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 34px;
    min-width: 0;
  }
  #meter i {
    width: 4px;
    height: 12%;
    min-height: 4px;
    border-radius: 3px;
    background: linear-gradient(180deg, var(--rose-soft), var(--rose));
    transition: height 0.09s ease;
  }
  #recTime {
    font-size: 13px;
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  #recCancel { color: var(--muted); }
  #recDone {
    background: linear-gradient(135deg, var(--rose), #d84176);
    border: none;
    color: #fff;
  }

  /* "new message" pill shown when the user has scrolled up */
  #jump {
    position: absolute;
    left: 50%;
    bottom: 96px;
    transform: translateX(-50%) translateY(8px);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: rgba(46, 24, 38, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    color: var(--rose-soft);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 5;
    box-shadow: var(--shadow);
  }
  #jump.show { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
  #jump svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* ---------- toast ---------- */
  #toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    background: rgba(46, 24, 38, 0.92);
    border: 1px solid var(--border);
    backdrop-filter: blur(12px);
    color: var(--text);
    font-size: 13.5px;
    padding: 10px 18px;
    border-radius: 14px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    max-width: 86%;
    text-align: center;
    z-index: 20;
    box-shadow: var(--shadow);
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- memory panel ---------- */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 3, 7, 0.6);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  @media (min-width: 800px) { #overlay { align-items: center; } }
  #panel {
    background: linear-gradient(170deg, #2b1826, #1f1019);
    border: 1px solid var(--border);
    border-radius: 22px 22px 0 0;
    padding: 24px 22px calc(24px + env(safe-area-inset-bottom));
    width: 100%;
    max-width: 480px;
    max-height: 75vh;
    overflow-y: auto;
    animation: rise 0.28s cubic-bezier(0.2, 0.9, 0.3, 1.1);
    box-shadow: var(--shadow);
  }
  @media (min-width: 800px) { #panel { border-radius: 22px; } }
  @keyframes rise { from { opacity: 0; transform: translateY(24px); } }
  #panel h2 {
    font-size: 16px;
    font-weight: 650;
    margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  #panel .sub { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .privacyLink {
    display: inline-block;
    font-size: 12.5px;
    color: var(--muted);
    text-decoration: underline;
    margin-bottom: 16px;
  }

/* ---------- header overflow menu ----------
   The five controls used to sit in the header and crowded the title on
   narrow screens. Toggles keep the menu open so their new state is
   visible; anything that takes over the screen closes it. */

function menuItems() {
  // excludes .langRow: it's a static wrapper around the <select>, not a
  // focusable roving item — Tab (not arrow keys) reaches the select
  return [...menuEl.querySelectorAll(".menuItem:not(.langRow)")];
}

function closeMenu(focusTrigger) {
  if (menuEl.hidden) return;
  // Focus must never be left inside a hidden subtree: a key pressed there
  // still routes through the menu's own handler, which would swallow the
  // Escape meant for whatever the item just opened.
  const heldFocus = menuEl.contains(document.activeElement);
  menuEl.hidden = true;
  menuBtn.setAttribute("aria-expanded", "false");
  if (focusTrigger || heldFocus) menuBtn.focus();
}

function openMenu(focusFirst) {
  menuEl.hidden = false;
  menuBtn.setAttribute("aria-expanded", "true");
  if (focusFirst) menuItems()[0]?.focus();
}

menuBtn.onclick = (e) => {
  e.stopPropagation();
  menuEl.hidden ? openMenu(false) : closeMenu(false);
};

// clicking anywhere else dismisses it
document.addEventListener("pointerdown", (e) => {
  if (!menuEl.hidden && !menuEl.contains(e.target) && e.target !== menuBtn) closeMenu(false);
});

menuEl.addEventListener("keydown", (e) => {
  if (menuEl.hidden) return; // belt and braces: never act for a closed menu
  const items = menuItems();
  const i = items.indexOf(document.activeElement);
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    const next = e.key === "ArrowDown" ? i + 1 : i - 1;
    items[(next + items.length) % items.length].focus();
  } else if (e.key === "Home" || e.key === "End") {
    e.preventDefault();
    (e.key === "Home" ? items[0] : items[items.length - 1]).focus();
  } else if (e.key === "Escape") {
    e.stopPropagation(); // don't also close the memory panel
    closeMenu(true);
  }
});

// Tab needs to reach the language <select>, so it isn't intercepted like
// the other keys — instead, close only once focus actually leaves the menu
menuEl.addEventListener("focusout", (e) => {
  if (!menuEl.contains(e.relatedTarget)) closeMenu(false);
});

menuBtn.addEventListener("keydown", (e) => {
  if (e.key === "ArrowDown" || e.key === "Enter" || e.key === " ") {
    e.preventDefault();
    openMenu(true);

});

function detectLang() {
  try {
    const saved = localStorage.getItem(LANG_KEY);
    if (SUPPORTED_LANGS.includes(saved)) return saved;
  } catch {}
  const nav = ((navigator.language || "en").split("-")[0] || "en").toLowerCase();
  return SUPPORTED_LANGS.includes(nav) ? nav : "en";
}

let currentLang = detectLang();

function t(key, vars) {
  let s = (I18N[currentLang] && I18N[currentLang][key]) || I18N.en[key] || key;
  if (vars) for (const k in vars) s = s.replaceAll("{" + k + "}", vars[k]);
  return s;
}

function applyI18n() {
  document.documentElement.lang = currentLang;
  document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-title]").forEach((el) => { el.title = t(el.dataset.i18nTitle); });
  document.querySelectorAll("[data-i18n-aria]").forEach((el) => { el.setAttribute("aria-label", t(el.dataset.i18nAria)); });
  document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => { el.placeholder = t(el.dataset.i18nPlaceholder); });
}
applyI18n();
setStatus(t("statusOnline")); // the static markup's "online" is only ever English

const langSelect = document.getElementById("langSelect");
langSelect.value = currentLang;
langSelect.onchange = () => {
  if (!SUPPORTED_LANGS.includes(langSelect.value)) return;
  currentLang = langSelect.value;
  try { localStorage.setItem(LANG_KEY, currentLang); } catch {}
  applyI18n();
  if (overlay.classList.contains("show")) renderFacts(); // generated content
  // the header status is also generated content — refresh it too, but only
  // when idle, so a switch mid-reply/recording doesn't stomp on that state
  if (!busy && !rec && !pipeline && Date.now() >= cooldownUntil) setStatus(t("statusOnline"));
  toast(t("langChanged"));
};

/* Her "morning/afternoon/evening/tonight" comes from YOUR clock, not the
   server's — the server runs in UTC, hours off from most visitors. */
function localHour() {
  return new Date().getHours();
}

/* ---------- long-term memory ----------
   Facts about the visitor live in THIS browser (localStorage) and are sent
   up only to personalize their own session; the server stores nothing. */

const MEM_KEY = "lissa_facts";

function loadFacts() {
  try {
    const f = JSON.parse(localStorage.getItem(MEM_KEY)) || [];
    return Array.isArray(f) ? f.filter((x) => typeof x === "string") : [];
  } catch { return []; }
}

function saveFacts(f) {
  try { localStorage.setItem(MEM_KEY, JSON.stringify(f)); } catch {}
}

let facts = loadFacts();
let exchanges = 0; // completed replies since load — memory refreshes every 4th

async function memorize() {
  try {
    const r = await fetch("/api/memorize", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ facts }),
    });
    const data = await r.json();
    if (Array.isArray(data.facts) && data.facts.length) {
      facts = data.facts;
      saveFacts(facts);
    }
  } catch {} // memory is a nice-to-have, never break the chat over it
}

/* ---------- smart auto-scroll ----------
   Follow new content only while the user is at (or near) the bottom.
   Scrolling up pauses following; a "new message" pill jumps back down. */

const jumpBtn = document.getElementById("jump");
let autoScroll = true;

function nearBottom() {
  return chat.scrollHeight - chat.scrollTop - chat.clientHeight < 60;
}

function scrollChat(force) {
  if (force) autoScroll = true;
  // instant, not smooth: a lingering smooth animation fights the user's
  // upward scroll and re-arms following when it lands at the bottom
  if (autoScroll) chat.scrollTo({ top: chat.scrollHeight, behavior: "instant" });
  else jumpBtn.classList.add("show");
}

chat.addEventListener("scroll", () => {
  if (nearBottom()) {
    autoScroll = true;
    jumpBtn.classList.remove("show");
  }
});
// only real user gestures pause following (programmatic smooth-scrolls also
// fire "scroll" events mid-flight, so they can't be trusted for this).
// wheel fires BEFORE the scroll position moves, so an upward wheel must
// pause immediately — nearBottom() is still true at that instant
chat.addEventListener("wheel", (e) => {
  const scrollable = chat.scrollHeight > chat.clientHeight + 10;
  if (scrollable && (e.deltaY < 0 || !nearBottom())) autoScroll = false;
}, { passive: true });
chat.addEventListener("touchmove", () => {
  if (!nearBottom()) autoScroll = false;
}, { passive: true });

jumpBtn.onclick = () => {
  autoScroll = true;
  jumpBtn.classList.remove("show");
  chat.scrollTo({ top: chat.scrollHeight, behavior: "smooth" });
};

function toast(text) {
  const t = document.getElementById("toast");
  t.textContent = text;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 3400);
}

function setStatus(text, active) {
  statusEl.textContent = text;
  statusEl.classList.toggle("active", !!active);
}

/* muted time label inserted when messages are more than 5 minutes apart */
let lastStamp = 0;

function maybeStamp() {
  const now = Date.now();
  if (now - lastStamp > 5 * 60 * 1000) {
    const d = document.createElement("div");
    d.className = "timestamp";
    d.textContent = new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
    chat.appendChild(d);
  }
  lastStamp = now;
}

/* announce `text` to screen readers once, without the word-by-word noise
   the streaming reveal would produce in a live chat region */
const sr = document.getElementById("sr");
function announce(text) {
  sr.textContent = "";
  setTimeout(() => { sr.textContent = text; }, 60);
}

function addBubble(who, text, image) {
  maybeStamp();
  const div = document.createElement("div");
  div.className = "bubble " + who;
  if (image) {
    const im = document.createElement("img");
    im.src = image;
    im.alt = t("photoAlt");
    div.appendChild(im);
    if (text) {
      const cap = document.createElement("div");
      cap.textContent = text;
      div.appendChild(cap);
    }
  } else {
    div.textContent = text;
  }
  if (who === "lissa") addCopy(div, text);
  chat.appendChild(div);
  scrollChat(who === "user"); // sending your own message always snaps down
  return div;
}

function typingBubble() {
  maybeStamp();
  const div = document.createElement("div");
  div.className = "bubble lissa";
  div.innerHTML = '<span class="typing-dots"><i></i><i></i><i></i></span>';
  chat.appendChild(div);
  scrollChat();
  return div;
}

function copyText(text) {
  if (navigator.clipboard) return navigator.clipboard.writeText(text);
  // non-secure origins (plain http on a LAN) have no clipboard API
  return new Promise((res, rej) => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand("copy");
    ta.remove();
    ok ? res() : rej();
  });
}

/* hover/tap copy button on a finished Lissa bubble — only add once the
   text is final, streaming rewrites textContent and would wipe it */
function addCopy(bubble, text) {
  if (!text || bubble.querySelector(".copyBtn")) return;
  const btn = document.createElement("button");
  btn.className = "copyBtn";
  btn.title = t("copyTitle");
  btn.setAttribute("aria-label", t("copyTitle"));
  btn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  btn.onclick = () => copyText(text).then(
    () => toast(t("copied")),
    () => toast(t("copyFailed"))
  );
  bubble.appendChild(btn);
}

/* append a "try again" button to an error bubble; clicking it removes the
   bubble and runs `action` (call AFTER setting the bubble's textContent) */
function addRetry(bubble, action) {
  const btn = document.createElement("button");
  btn.className = "retryBtn";
  btn.textContent = t("tryAgain");
  btn.onclick = () => { bubble.remove(); action(); };
  bubble.appendChild(btn);
}

function setBusy(b) {
  busy = b;
  micBtn.disabled = b;
  // while a reply streams, the send button becomes a stop button
  sendBtn.classList.toggle("stop", b);
  sendBtn.title = b ? t("stopTitle") : t("sendTitle");
  sendBtn.setAttribute("aria-label", sendBtn.title);
  setStatus(b ? t("statusTyping") : t("statusOnline"), b);
}

/* ---------- photo attachment ---------- */

const attachPreview = document.getElementById("attachPreview");
const attachImg = document.getElementById("attachImg");
let pendingImage = null; // data URL waiting to go with the next message

async function shrinkImage(file) {
  // downscale to ≤1024px JPEG so uploads stay small
  try {
    const bmp = await createImageBitmap(file);
    const scale = Math.min(1, 1024 / Math.max(bmp.width, bmp.height));
    const canvas = document.createElement("canvas");
    canvas.width = Math.max(1, Math.round(bmp.width * scale));
    canvas.height = Math.max(1, Math.round(bmp.height * scale));
    canvas.getContext("2d").drawImage(bmp, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL("image/jpeg", 0.85);
  } catch {
    return new Promise((res) => {
      const fr = new FileReader();
      fr.onload = () => res(fr.result);
      fr.readAsDataURL(file);
    });
  }
}

async function setAttachment(file) {
  if (!file.type.startsWith("image/")) { toast(t("notAnImage")); return; }
  pendingImage = await shrinkImage(file);
  attachImg.src = pendingImage;
  attachPreview.hidden = false;
}

function clearAttachment() {
  pendingImage = null;
  attachPreview.hidden = true;
  attachImg.removeAttribute("src");
}

/* ---------- chat ---------- */

/* rate-limit countdown: while she "catches her breath", show a ticking
   status and hold the send button instead of dead-ending */
let cooldownUntil = 0;

function startCooldown(secs) {
  cooldownUntil = Date.now() + secs * 1000;
  sendBtn.disabled = true;
  const iv = setInterval(() => {
    const left = Math.ceil((cooldownUntil - Date.now()) / 1000);
    if (left <= 0) {
      clearInterval(iv);
      sendBtn.disabled = false;
      if (!busy && !rec) setStatus(t("statusOnline"));
      return;
    }
    if (!busy && !rec) setStatus(t("cooldown", { secs: left }), true);
  }, 250);
}

async function send(text, isRetry, retryImage) {
  text = text.trim();
  const image = isRetry ? retryImage || null : pendingImage;
  if ((!text && !image) || busy || Date.now() < cooldownUntil) return;
  stopSpeaking();
  if (!isRetry) { // a retry's user bubble is already in the chat
    addBubble("user", text, image);
    clearAttachment();
    msg.value = "";
    msg.style.height = "";
  }
  setBusy(true);

  const bubble = typingBubble();
  let full = "";
  let aborted = false;
  let connErr = false;
  const ac = new AbortController();
  chatAbort = ac;
  // With voice on, the pipeline types the reply into the bubble in sync
  // with her speech; with voice off, text streams in at full speed.
  const pipe = voiceOn ? newPipeline(bubble) : null;
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text, image, lang: currentLang }),
      signal: ac.signal,
    });
    const limitedFor = parseInt(res.headers.get("x-ratelimited") || "0", 10);
    if (limitedFor > 0) startCooldown(limitedFor);
    const reader = res.body.getReader();
    const dec = new TextDecoder();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      full += dec.decode(value, { stream: true });
      if (pipe && !pipe.dead) {
        feedSpeech(pipe, full, false); // she speaks + types finished sentences
      } else {
        bubble.textContent = full;
        scrollChat();
      }
    }
  } catch (e) {
    if (e.name === "AbortError") {
      aborted = true; // user hit stop — keep whatever already arrived
    } else {
      connErr = true;
    }
  }
  chatAbort = null;
  setBusy(false);
  if (aborted) {
    stopSpeaking(); // cut the voice too; flushes partial text into the bubble
    if (!full.trim()) bubble.remove();
    else if (!pipe || pipe.dead) bubble.textContent = full;
    return;
  }
  if (connErr) {
    stopSpeaking(); // no point speaking an error message
    bubble.textContent = full
      ? full + t("connLostMidReply")
      : t("connLostInitial");
    addRetry(bubble, () => send(text, true, image));
    scrollChat();
    announce(bubble.textContent);
    return;
  }
  if (pipe && !pipe.dead) {
    feedSpeech(pipe, full, true); // adds the copy button when speech ends
  } else {
    bubble.textContent = full;
    addCopy(bubble, full);
    setTimeout(maybeListen, 600); // voice off: reply is done once text lands
  }
  announce(t("exportLissa") + full);
  if (++exchanges % 4 === 0) memorize(); // fire-and-forget memory refresh
}

/* ---------- spoken replies ----------
   As the reply streams in, each completed sentence is dispatched for
   synthesis immediately (Edge's free neural voice — no quota to manage),
   so she starts talking while the rest is still being written. Clips are
   synthesized in parallel but play strictly in order, and the text types
   out in sync with each clip. */

let pipeline = null;   // active speech pipeline
let nudgeAudio = null; // greeting clip replayed after an autoplay block

function speakingUI(on) {
  avatarWrap.classList.toggle("speaking", on);
  if (!busy && !rec) setStatus(on ? t("statusSpeaking") : t("statusOnline"), on);
}

function stopSpeaking() {
  if (nudgeAudio) { nudgeAudio.pause(); nudgeAudio = null; }
  if (pipeline) {
    const p = pipeline;
    pipeline = null;
    p.dead = true;
    p.aborts.forEach((a) => a.abort());
    if (p.audio) { p.audio.pause(); p.audio.removeAttribute("src"); }
    if (p.bubble) {
      // show everything received so far — don't lose text mid-reveal
      p.bubble.textContent = p.fullText;
      scrollChat();
    }
  }
  if (window.speechSynthesis) speechSynthesis.cancel();
  speakingUI(false);
}

function cleanForSpeech(text) {
  return text
    .replace(/[*_#`]/g, "")
    .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}]/gu, "")
    .trim();
}

function newPipeline(bubble) {
  const p = {
    items: [],        // {raw, clean, blobP} in speaking order
    spoken: 0,        // chars of the reply already dispatched
    fullText: "",     // everything received so far (for flushing)
    bubble: bubble || null,   // where the reply is typed out
    bubbleStarted: false,     // typing dots cleared yet?
    revealChain: Promise.resolve(), // keeps reveals in order
    playing: false,
    finished: false,  // no more text will be fed
    dead: false,
    aborts: new Set(),
    audio: null,
  };
  pipeline = p;
  return p;
}

function pipeAdd(p, raw) {
  if (p.dead || !raw) return;
  const clean = cleanForSpeech(raw);
  let blobP = Promise.resolve(null);
  if (clean) {
    const ac = new AbortController();
    p.aborts.add(ac);
    // synthesis starts NOW, in parallel with whatever is already playing.
    // Always the Edge voice: sentence-level clips would burn through the
    // tiny Gemini TTS quota in a couple of replies, and a mid-reply voice
    // switch when it runs out sounds broken.
    blobP = fetch("/api/say", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: clean, edge: true }),
      signal: ac.signal,
    })
      .then((r) => (r.ok && r.status !== 204 ? r.blob() : null))
      .catch(() => null);
  }
  p.items.push({ raw, clean, blobP });
  pipePlay(p);
}

async function pipePlay(p) {
  if (p.playing || p.dead) return;
  p.playing = true;
  while (p.items.length) {
    const { raw, clean, blobP } = p.items.shift();
    const blob = await blobP;
    if (p.dead) break;
    if (blob) {
      await playClip(p, raw, blob);
    } else if (clean) {
      // server voice unreachable — browser voice, typing at a guessed pace
      const reveal = queueReveal(p, raw, Math.max(1000, raw.length * 50));
      await speakBrowser(clean);
      await reveal;
    } else {
      await queueReveal(p, raw, 200); // nothing speakable (pure emoji etc.)
    }
  }
  p.playing = false;
  if (!p.dead && p.finished && p.items.length === 0) {
    await p.revealChain;
    if (p.dead) return;
    if (p.bubble) {
      p.bubble.textContent = p.fullText; // make sure nothing was missed
      addCopy(p.bubble, p.fullText);
      scrollChat();
    }
    speakingUI(false);
    setTimeout(maybeListen, 500); // hands-free: her turn is over
  }
}

function playClip(p, raw, blob) {
  return new Promise((done) => {
    const url = URL.createObjectURL(blob);
    const a = new Audio(url);
    p.audio = a;
    let revealed = false;
    const finish = () => {
      URL.revokeObjectURL(url);
      if (!revealed) { revealed = true; queueReveal(p, raw, 300); }
      done();
    };
    a.onended = finish;
    a.onerror = finish;
    a.onplaying = () => {
      if (revealed) return;
      revealed = true;
      // type the segment out over the length of the clip
      const ms = isFinite(a.duration) && a.duration > 0
        ? a.duration * 950
        : Math.max(1000, raw.length * 50);
      queueReveal(p, raw, ms);
    };
    speakingUI(true);
    a.play().catch((err) => {
      // autoplay blocked (greeting before any interaction) — reveal the
      // text right away and offer to replay the clip on the first tap
      if (err && err.name === "NotAllowedError") nudgeAutoplay(blob);
      finish();
    });
  });
}

let autoplayNudged = false;

function nudgeAutoplay(blob) {
  if (autoplayNudged) return;
  autoplayNudged = true;
  toast(t("autoplayBlocked"));
  document.addEventListener("pointerdown", () => {
    if (pipeline || busy || rec) return; // don't talk over anything live
    const url = URL.createObjectURL(blob);
    nudgeAudio = new Audio(url);
    nudgeAudio.onplaying = () => speakingUI(true);
    nudgeAudio.onended = () => { speakingUI(false); URL.revokeObjectURL(url); };
    nudgeAudio.onerror = () => { speakingUI(false); URL.revokeObjectURL(url); };
    nudgeAudio.play().catch(() => URL.revokeObjectURL(url));
  }, { once: true });
}

/* Word-by-word typing of `text` into the bubble over ~ms, kept in order
   even when clips finish at odd times. */
function queueReveal(p, text, ms) {
  p.revealChain = p.revealChain.then(() => revealText(p, text, ms));
  return p.revealChain;
}

function revealText(p, text, ms) {
  return new Promise((res) => {
    if (!p.bubble || p.dead) return res();
    if (!p.bubbleStarted) { p.bubble.textContent = ""; p.bubbleStarted = true; }
    const tokens = text.match(/\S+\s*/g) || [text];
    const step = Math.min(350, Math.max(35, ms / tokens.length));
    let i = 0;
    const iv = setInterval(() => {
      if (p.dead) { clearInterval(iv); return res(); }
      p.bubble.textContent += tokens[i++];
      scrollChat();
      if (i >= tokens.length) { clearInterval(iv); res(); }
    }, step);
  });
}

/* index just past the last complete sentence in `text`, or 0 if none */
function lastSentenceEnd(text) {
  const m = text.match(/^[\s\S]*[.!?…]["')\]]*\s/);
  return m ? m[0].length : 0;
}

/* Feed streamed text to the pipeline. Completed sentences are dispatched
   for synthesis as they arrive: the first the moment it's done (fastest
   start), later ones batched a little so long replies don't turn into a
   flood of tiny clips. */
function feedSpeech(p, full, done) {
  if (p.dead) return;
  p.fullText = full;
  if (!done) {
    const pending = full.slice(p.spoken);
    const cut = lastSentenceEnd(pending);
    const min = p.spoken === 0 ? 1 : 60;
    if (cut >= min) {
      p.spoken += cut;
      pipeAdd(p, pending.slice(0, cut));
    }
    return;
  }
  const rest = full.slice(p.spoken);
  p.spoken = full.length;
  if (rest.trim()) pipeAdd(p, rest);
  p.finished = true;
  if (!p.playing && p.items.length === 0) {
    if (p.bubble) {
      p.bubble.textContent = p.fullText;
      addCopy(p.bubble, p.fullText);
    }
    speakingUI(false);
    setTimeout(maybeListen, 500);
  }
}

function speak(text, bubble) {
  stopSpeaking();
  const p = newPipeline(bubble);
  feedSpeech(p, text, true);
}

/* browser voice fallback */
let browserVoice = null;

function pickBrowserVoice() {
  const voices = speechSynthesis.getVoices();
  const prefs = [
    /natural/i, /online/i, /aria/i, /jenny/i, /ava/i,
    /google us english/i, /female/i, /samantha/i, /zira/i,
  ];
  for (const p of prefs) {
    const v = voices.find((v) => p.test(v.name) && v.lang.toLowerCase().startsWith("en"));
    if (v) return v;
  }
  return voices.find((v) => v.lang.toLowerCase().startsWith("en")) || voices[0] || null;
}

if (window.speechSynthesis) {
  speechSynthesis.getVoices(); // prime the async voice list
  speechSynthesis.onvoiceschanged = () => { browserVoice = pickBrowserVoice(); };
}

function speakBrowser(text) {
  return new Promise((done) => {
    if (!window.speechSynthesis) return done();
    const u = new SpeechSynthesisUtterance(text);
    if (!browserVoice) browserVoice = pickBrowserVoice();
    if (browserVoice) u.voice = browserVoice;
    u.pitch = 1.06;
    u.rate = 1.02;
    u.onstart = () => speakingUI(true);
    u.onend = () => done();
    u.onerror = () => done();
    speechSynthesis.speak(u);
  });
}

voiceBtn.onclick = () => {

  voiceBtn.classList.toggle("off", !voiceOn);

/* ---------- hands-free conversation ----------
   With the mode on, the mic opens by itself whenever she isn't speaking
   and a reply isn't streaming; simple voice-activity detection sends the
   recording after ~1.3s of silence, and the loop repeats. */

const hfBtn = document.getElementById("hfBtn");
let handsFree = false;
let hfFails = 0; // consecutive empty/failed recordings — bail out at 3

function maybeListen() {
  if (!handsFree || busy || rec || pipeline) return;
  startRecording(true);
}

function resumeHandsFree() {
  if (!handsFree) return;
  if (++hfFails >= 3) {
    setHandsFree(false);
    toast(t("hfOffNoHear"));
    return;
  }
  setTimeout(maybeListen, 600);
}

function setHandsFree(on) {
  handsFree = on;
  hfBtn.classList.toggle("on", on);
  hfBtn.setAttribute("aria-checked", String(on));
  hfFails = 0;
  if (on) {
    if (!voiceOn) { // spoken replies are the point of hands-free
      voiceOn = true;
      voiceBtn.classList.remove("off");
      voiceBtn.setAttribute("aria-checked", "true");
    }
    toast(t("hfOn"));
    setTimeout(maybeListen, 300);
  } else {
    if (rec && rec.auto) teardownRecording();
    toast(t("hfOff"));
  }
}

hfBtn.onclick = () => setHandsFree(!handsFree);

/* ---------- voice input ---------- */

/* AudioWorklet processor: forwards raw mic samples to the main thread */
const MIC_WORKLET = `
class MicCapture extends AudioWorkletProcessor {
  process(inputs) {
    const ch = inputs[0] && inputs[0][0];
    if (ch) this.port.postMessage(new Float32Array(ch));
    return true;
  }
}
registerProcessor("mic-capture", MicCapture);
`;

function setRecordingUI(on) {
  composer.hidden = on;
  recorder.hidden = !on;
}

/* silence-based auto-send for hands-free mode; level arrives ~21x/sec */
function autoVad(level) {
  const r = rec;
  if (!r || !r.auto || r.stopping) return;
  const now = Date.now();
  if (level > 0.02) { r.voiced = true; r.lastVoice = now; }
  if (r.voiced && now - r.lastVoice > 1300) {
    r.stopping = true;
    stopRecording(); // they said something and went quiet — send it
  } else if (!r.voiced && now - r.started > 10000) {
    teardownRecording();
    setHandsFree(false);
    toast(t("hfOffSilence"));
  } else if (now - r.started > 30000) {
    r.stopping = true;
    stopRecording(); // hard cap on one turn
  }
}

async function startRecording(auto) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    toast(t("micSecureOrigin"));
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (e) {
    if (e.name === "NotFoundError" || e.name === "DevicesNotFoundError") {
      toast(t("micNotFound"));
    } else if (e.name === "NotAllowedError" || e.name === "PermissionDeniedError") {
      toast(t("micBlocked"));
    } else {
      toast(t("micError", { msg: e.message || e.name }));
    }
    return;
  }
  try {
    const ctx = new AudioContext();
    // Browsers often create the context suspended (the permission prompt
    // consumes the click's user activation) — resume or nothing is captured.
    if (ctx.state !== "running") await ctx.resume();
    const source = ctx.createMediaStreamSource(stream);
    const chunks = [];
    const levels = [];
    // worklet chunks are tiny (128 samples), so aggregate ~2048 samples
    // between meter updates instead of redrawing per chunk
    let sum = 0, n = 0;
    const handleChunk = (data) => {
      chunks.push(data);
      for (let i = 0; i < data.length; i += 16) { sum += data[i] * data[i]; n++; }
      if (n >= 128) {
        const level = Math.sqrt(sum / n);
        levels.push(level);
        sum = 0; n = 0;
        if (levels.length > BAR_COUNT) levels.shift();
        bars.forEach((b, i) => {
          const v = levels[levels.length - 1 - i] || 0;
          b.style.height = Math.min(96, 10 + v * 480) + "%";
        });
        autoVad(level);
      }
    };
    let proc;
    try {
      const url = URL.createObjectURL(new Blob([MIC_WORKLET], { type: "application/javascript" }));
      await ctx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);
      proc = new AudioWorkletNode(ctx, "mic-capture");
      proc.port.onmessage = (e) => handleChunk(e.data);
    } catch (err) {
      // older browsers: fall back to the deprecated ScriptProcessorNode
      proc = ctx.createScriptProcessor(4096, 1, 1);
      proc.onaudioprocess = (ev) =>
        handleChunk(new Float32Array(ev.inputBuffer.getChannelData(0)));
    }
    source.connect(proc);
    proc.connect(ctx.destination); // keeps the graph pulling; outputs silence
    const started = Date.now();
    const timer = setInterval(() => {
      const s = Math.floor((Date.now() - started) / 1000);
      recTime.textContent = Math.floor(s / 60) + ":" + String(s % 60).padStart(2, "0");
    }, 250);
    rec = { stream, ctx, proc, chunks, rate: ctx.sampleRate, timer,
            auto: !!auto, started, voiced: false, lastVoice: 0, stopping: false };
    recTime.textContent = "0:00";
    setRecordingUI(true);
    setStatus(t("statusListening"), true);
  } catch (e) {
    stream.getTracks().forEach((t) => t.stop());
    toast(t("micStartFailed", { msg: e.message || e.name }));
  }
}

function teardownRecording() {
  const r = rec;
  rec = null;
  clearInterval(r.timer);
  r.proc.disconnect();
  r.stream.getTracks().forEach((t) => t.stop());
  r.ctx.close();
  bars.forEach((b) => (b.style.height = ""));
  setRecordingUI(false);
  setStatus(t("statusOnline"));
  return r;
}

async function stopRecording() {
  const { chunks, rate } = teardownRecording();

  const total = chunks.reduce((n, c) => n + c.length, 0);
  if (total < rate / 2) {
    toast(t("noAudioCaught"));
    resumeHandsFree();
    return;
  }
  let peak = 0;
  for (const c of chunks) for (let i = 0; i < c.length; i++) peak = Math.max(peak, Math.abs(c[i]));
  if (peak < 0.005) {
    toast(t("onlySilence"));
    resumeHandsFree();
    return;
  }

  micBtn.classList.add("busy");
  setStatus(t("statusUnderstanding"), true);
  try {
    const res = await fetch("/api/transcribe?lang=" + encodeURIComponent(currentLang), {
      method: "POST",
      headers: { "Content-Type": "audio/wav" },
      body: encodeWav(chunks, total, rate),
    });
    const { text, error } = await res.json();
    if (error) { toast(error); resumeHandsFree(); return; }
    if (!text) {
      toast(t("noWordsHeard"));
      resumeHandsFree();
      return;
    }
    hfFails = 0;
    send(text);
  } catch (e) {
    toast(t("transcriptionFailed"));
    resumeHandsFree();
  } finally {
    micBtn.classList.remove("busy");
    if (!busy) setStatus(t("statusOnline"));
  }
}

function encodeWav(chunks, total, rate) {
  const buf = new ArrayBuffer(44 + total * 2);
  const v = new DataView(buf);
  const str = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  str(0, "RIFF"); v.setUint32(4, 36 + total * 2, true); str(8, "WAVE");
  str(12, "fmt "); v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);            // PCM
  v.setUint16(22, 1, true);            // mono
  v.setUint32(24, rate, true);
  v.setUint32(28, rate * 2, true);     // byte rate
  v.setUint16(32, 2, true);            // block align
  v.setUint16(34, 16, true);           // bits per sample
  str(36, "data"); v.setUint32(40, total * 2, true);
  let o = 44;
  for (const c of chunks) {
    for (let i = 0; i < c.length; i++, o += 2) {
      const s = Math.max(-1, Math.min(1, c[i]));
      v.setInt16(o, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    }
  }
  return buf;
}

/* tap = open the recorder (finish with the check/cancel buttons);
   press-and-hold = walkie-talkie, releasing sends the recording */
const HOLD_MS = 400;
let micDownAt = 0;

micBtn.addEventListener("pointerdown", (e) => {
  if (busy || rec) return;
  e.preventDefault();
  micDownAt = Date.now();
  startRecording();
  const release = () => {
    document.removeEventListener("pointerup", release);
    document.removeEventListener("pointercancel", release);
    if (rec && Date.now() - micDownAt >= HOLD_MS) stopRecording();
  };
  document.addEventListener("pointerup", release);
  document.addEventListener("pointercancel", release);
});
// keyboard activation (Enter/Space) fires click without a pointerdown;
// the timestamp guard keeps pointer taps from double-starting
micBtn.addEventListener("click", () => {
  if (!rec && !busy && Date.now() - micDownAt > 500) startRecording();
});
micBtn.addEventListener("contextmenu", (e) => e.preventDefault());
document.getElementById("recDone").onclick = () => { if (rec) stopRecording(); };
document.getElementById("recCancel").onclick = () => {
  if (!rec) return;
  const wasAuto = rec.auto;
  teardownRecording();
  if (wasAuto) setHandsFree(false); // cancelling means "stop listening to me"
  else toast(t("recordingDiscarded"));
};

  const { text } = await (await fetch("/api/reset", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ facts, lang: currentLang, hour: localHour() }),
  })).json();
  setStatus(t("statusOnline"));
  chat.innerHTML = "";
  lastStamp = 0;
  addBubble("lissa", text);
  announce(t("exportLissa") + text);
  toast(t("resetDone"));
};

/* ---------- wiring ---------- */

sendBtn.onclick = () => {
  if (busy) { if (chatAbort) chatAbort.abort(); return; } // acting as stop
  send(msg.value);
};
// Enter sends, Shift+Enter makes a newline; ignore Enter while an IME
// composition is in progress (Japanese/Chinese/Korean input)
msg.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    send(msg.value);
  }
});
// auto-grow the composer up to its max-height
msg.addEventListener("input", () => {
  msg.style.height = "auto";
  msg.style.height = Math.min(msg.scrollHeight, 120) + "px";
});

/* photo attachment wiring */
const fileInput = document.getElementById("file");
document.getElementById("attach").onclick = () => fileInput.click();
fileInput.onchange = () => {
  const f = fileInput.files[0];
  if (f) setAttachment(f);
  fileInput.value = "";
};
document.getElementById("attachRemove").onclick = clearAttachment;
// pasting an image into the composer attaches it
msg.addEventListener("paste", (e) => {
  const f = [...(e.clipboardData?.files || [])].find((f) => f.type.startsWith("image/"));
  if (f) { e.preventDefault(); setAttachment(f); }
});

// No memory persistence — each conversation is independent.

async function boot() {
  // a refresh shouldn't look like the conversation was lost — the server
  // keeps the session alive for a few hours, so restore it silently
  try {
    const { messages } = await (await fetch("/api/history")).json();
    if (messages && messages.length) {
      for (const m of messages) addBubble(m.who, m.text);
      scrollChat(true);
      toast(t("pickedUpWhereLeftOff"));
      msg.focus();
      return;
    }
  } catch (e) { /* server unreachable — fall through, greeting shows the error */ }

  const bubble = typingBubble();
  try {
    const { text } = await (await fetch("/api/hello", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ facts, lang: currentLang, hour: localHour() }),
    })).json();
    if (voiceOn) {
      speak(text, bubble);
    } else {
      bubble.textContent = text;
      addCopy(bubble, text);
    }
    announce(t("exportLissa") + text);
  } catch (e) {
    bubble.textContent = t("bootConnError");
    addRetry(bubble, boot);
    announce(bubble.textContent);
  }
  msg.focus();
}
boot();

// installable as an app; the worker never touches /api/ so chat stays live
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}
</script>
